<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>PDF 导出测试</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .test-box { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .chart-box { background: white; padding: 15px; border: 1px solid #ddd; border-radius: 4px; height: 150px; }
    button { background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    button:hover { background: #2563eb; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: red; background: #fee; padding: 10px; border-radius: 5px; margin-top: 10px; }
    .success { color: green; background: #efe; padding: 10px; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>📄 PDF 导出功能测试</h1>
  
  <div id="test-dashboard" class="test-box" style="width: 800px;">
    <h2>测试仪表板</h2>
    <p>这是一个用于测试 PDF 导出的示例内容</p>
    
    <div class="chart-box">
      <h3>📊 示例图表</h3>
      <p>图表内容区域</p>
    </div>
    
    <div style="margin-top: 15px; display: flex; gap: 10px;">
      <div class="chart-box" style="flex: 1;">
        <h4>KPI 1</h4>
        <p style="font-size: 24px; font-weight: bold;">97.2%</p>
      </div>
      <div class="chart-box" style="flex: 1;">
        <h4>KPI 2</h4>
        <p style="font-size: 24px; font-weight: bold;">1,234</p>
      </div>
    </div>
  </div>
  
  <div style="margin-top: 20px;">
    <button id="exportBtn" onclick="exportPDF()">📥 导出 PDF</button>
  </div>
  
  <div id="status"></div>
  <div id="error" class="error" style="display: none;"></div>

  <script>
    async function exportPDF() {
      const btn = document.getElementById('exportBtn');
      const status = document.getElementById('status');
      const errorEl = document.getElementById('error');
      
      btn.disabled = true;
      btn.textContent = '正在导出...';
      status.textContent = '';
      errorEl.style.display = 'none';
      
      try {
        const element = document.getElementById('test-dashboard');
        
        if (!element || element.clientWidth === 0 || element.clientHeight === 0) {
          throw new Error('仪表板内容为空或未加载完成');
        }
        
        console.log('Capturing element...');
        const canvas = await html2canvas(element, {
          scale: 2,
          useCORS: true,
          logging: true,
          backgroundColor: '#ffffff'
        });
        
        console.log('Canvas created:', canvas.width, 'x', canvas.height);
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'portrait',
          unit: 'mm',
          format: 'a4'
        });
        
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const imgWidth = pageWidth;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        
        console.log('PDF page:', pageWidth, 'x', pageHeight);
        console.log('Image:', imgWidth, 'x', imgHeight);
        
        const imgData = canvas.toDataURL('image/png');
        
        let heightLeft = imgHeight;
        let yPosition = 0;
        
        while (heightLeft > 0) {
          pdf.addImage(imgData, 'PNG', 0, yPosition, imgWidth, imgHeight);
          heightLeft -= pageHeight;
          yPosition -= pageHeight;
          
          if (heightLeft > 0) {
            pdf.addPage();
          }
        }
        
        const filename = '测试仪表板_' + new Date().toISOString().slice(0, 10) + '.pdf';
        pdf.save(filename);
        
        status.className = 'success';
        status.textContent = '✅ PDF 导出成功！文件: ' + filename;
        
      } catch (e) {
        console.error('Export error:', e);
        errorEl.textContent = '❌ 导出失败: ' + e.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '📥 导出 PDF';
      }
    }
  </script>
</body>
</html>
