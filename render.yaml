# Render Blueprint for InsightDash
# This file enables automatic deployment on Render.com
# See: https://render.com/docs/blueprint-spec

services:
  # Web Service - Next.js Application
  - type: web
    name: insightdash
    runtime: node
    plan: free
    region: singapore
    branch: master
    rootDir: .
    # Auto-deploy on every push to master
    autoDeploy: true
    buildCommand: |
      npm install && \
      npx prisma generate && \
      npx prisma db push --accept-data-loss && \
      npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Database - linked from database service below
      - key: DATABASE_URL
        fromDatabase:
          name: insightdash-db
          property: connectionString
      # NextAuth Configuration
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://insightdash.onrender.com
      # Optional: OAuth Providers (configure in Render dashboard)
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
    # Disk for file uploads (if needed)
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

# PostgreSQL Database
databases:
  - name: insightdash-db
    plan: free
    region: singapore
    ipAllowList: []
    postgresMajorVersion: "15"

# Version of this blueprint spec
version: "1"
