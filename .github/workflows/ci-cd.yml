name: CI/CD Pipeline

on:
  push:
    branches: [master, main, staging]
  pull_request:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXTAUTH_SECRET: dummy-secret-for-build
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, build-and-push-docker]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    
    steps:
      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to Staging environment..."
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_STAGING }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
      
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to complete..."
          sleep 30
      
      - name: Health check
        run: |
          echo "🏥 Checking health endpoint..."
          curl -sf "${{ vars.STAGING_URL }}/api/health" || exit 1
          echo "✅ Staging deployment healthy!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, build-and-push-docker]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    
    steps:
      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to Production environment..."
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_PRODUCTION }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
      
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to complete..."
          sleep 30
      
      - name: Health check
        run: |
          echo "🏥 Checking health endpoint..."
          curl -sf "${{ vars.PRODUCTION_URL }}/api/health" || exit 1
          echo "✅ Production deployment healthy!"

  notify:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build]
    if: always() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.lint-and-test.result }}" == "success" ] && [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ CI/CD Pipeline completed successfully!"
            echo "🚀 Render will auto-deploy from blueprint"
            echo "🔗 Monitor deployment at: https://dashboard.render.com"
          else
            echo "❌ CI/CD Pipeline failed"
            exit 1
          fi
