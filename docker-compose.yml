version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: insightdash-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: insightdash
      POSTGRES_PASSWORD: insightdash_password
      POSTGRES_DB: insightdash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightdash -d insightdash"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://insightdash:insightdash_password@db:5432/insightdash
    container_name: insightdash-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://insightdash:insightdash_password@db:5432/insightdash
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-development-secret-key
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
      - ./public:/app/public:ro
    command: npm run dev

volumes:
  postgres_data:
